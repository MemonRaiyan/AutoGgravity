version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: autogravity
      POSTGRES_PASSWORD: autogravity_secret
      POSTGRES_DB: autogravity
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - autogravity_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autogravity"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - autogravity_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api.dev
    ports:
      - "4000:4000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://autogravity:autogravity_secret@postgres:5432/autogravity?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - autogravity_network

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - api
    networks:
      - autogravity_network

volumes:
  pgdata:
  redis_data:

networks:
  autogravity_network:
    driver: bridge
