version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - autogravity_network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api.dev
    ports:
      - "4000:4000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=file:../database/dev.db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - autogravity_network

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - api
    networks:
      - autogravity_network

volumes:
  redis_data:

networks:
  autogravity_network:
    driver: bridge
